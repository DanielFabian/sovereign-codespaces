name: Build devhost ISOs

# Builds the two devhost installer ISOs in CI and (on tag push) attaches
# them to a GitHub Release. The ISO becomes the canonical install artifact
# — no local toolchain required to re-image a devhost.
#
# Triggers:
#   - tag push "v*"     → build + publish to release
#   - workflow_dispatch → build only (artifact uploaded for inspection)
#   - pull_request      → build only, smoke-test that the flake still evals
#                         and produces an ISO on both archs

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - "modules/**"
      - ".github/workflows/build-isos.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: devhost-hyperv
            runner: ubuntu-latest
            system: x86_64-linux
          - variant: devhost-mac
            runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # needed by softprops/action-gh-release to attach assets
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build ${{ matrix.variant }}-iso
        run: |
          nix build --print-build-logs \
            ".#packages.${{ matrix.system }}.${{ matrix.variant }}-iso"

      - name: Locate ISO
        id: iso
        run: |
          set -euo pipefail
          iso="$(find result/iso -maxdepth 1 -name '*.iso' -print -quit)"
          if [[ -z "$iso" ]]; then
            echo "No ISO found under result/iso" >&2
            exit 1
          fi
          # Rename to a stable, variant-tagged filename so release assets
          # don't collide and humans can tell them apart.
          out="${{ matrix.variant }}.iso"
          cp -L "$iso" "$out"
          sha256sum "$out" | tee "$out.sha256"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo "sha=$out.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-iso
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.sha }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.sha }}
          fail_on_unmatched_files: true
